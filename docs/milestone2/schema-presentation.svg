<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">FloodReady Milestone 2 database schema</title>
  <desc id="desc">Current PostgreSQL PostGIS schema. Flood reports are created immediately, AI analysis runs in the background, and report drafts are an alternate legacy path.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity=".12"/></filter>
    <style>
      text { font-family: Inter, Segoe UI, Arial, sans-serif; fill:#0f172a; }
      .title { font-size:34px; font-weight:700; }
      .subtitle { font-size:17px; fill:#475569; }
      .entity { font-size:23px; font-weight:700; }
      .field { font-size:14px; }
      .note { font-size:12px; fill:#475569; }
      .rel { font-size:13px; font-weight:700; fill:#334155; }
      .head { font-size:12px; font-weight:700; letter-spacing:.6px; fill:#475569; }
      .line { stroke:#e2e8f0; stroke-width:1; }
    </style>
  </defs>
  <rect width="1600" height="1080" fill="#ffffff"/>
  <text x="54" y="58" class="title">FloodReady Milestone 2 database schema</text>
  <text x="54" y="88" class="subtitle">Prisma schema + migrations: one PostgreSQL/PostGIS schema owned by Backend 1</text>
  <rect x="1140" y="37" width="405" height="45" rx="23" fill="#ecfdf5" stroke="#86efac"/>
  <text x="1342" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Backend 2 has no database access</text>

  <rect x="55" y="150" width="300" height="245" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="55" y="150" width="300" height="58" rx="18" fill="#e2e8f0"/><path d="M55 190h300v18H55z" fill="#e2e8f0"/>
  <text x="80" y="185" class="entity">users</text><text x="80" y="230" class="head">IDENTITY + OWNERSHIP</text><line x1="80" y1="242" x2="330" y2="242" class="line"/>
  <text x="80" y="268" class="field">id, name, email</text><text x="80" y="294" class="field">role, is_active</text><text x="80" y="320" class="note">owns reports, drafts, sessions, audit rows</text>

  <rect x="400" y="125" width="350" height="320" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="400" y="125" width="350" height="58" rx="18" fill="#ffedd5"/><path d="M400 165h350v18H400z" fill="#ffedd5"/>
  <text x="425" y="160" class="entity">report_drafts</text><text x="425" y="205" class="head">ALTERNATE WIREFRAME PATH</text><line x1="425" y1="217" x2="725" y2="217" class="line"/>
  <text x="425" y="243" class="field">id, reporter_id, category</text><text x="425" y="269" class="field">description, severity_claim</text><text x="425" y="295" class="field">image_path + image metadata</text><text x="425" y="321" class="field">expires_at</text><text x="425" y="367" class="note">Used by /reports/analyze</text><text x="425" y="389" class="note">Not used by main frontend/</text>

  <rect x="800" y="125" width="350" height="320" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <rect x="800" y="125" width="350" height="58" rx="18" fill="#d1fae5"/><path d="M800 165h350v18H800z" fill="#d1fae5"/>
  <text x="825" y="160" class="entity">ai_analyses</text><text x="825" y="205" class="head">ONE ATTEMPT - ONE OWNER</text><line x1="825" y1="217" x2="1125" y2="217" class="line"/>
  <text x="825" y="243" class="field">id, draft_id?, report_id?</text><text x="825" y="269" class="field">status: PROCESSING / SUCCEEDED / ...</text><text x="825" y="295" class="field">suggested_severity, confidence</text><text x="825" y="321" class="field">validation + weather fields</text><text x="825" y="347" class="field">summary, evidence, model metadata</text><text x="825" y="393" class="note">DB constraint: exactly one owner</text>

  <rect x="1200" y="125" width="345" height="320" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
  <rect x="1200" y="125" width="345" height="58" rx="18" fill="#dbeafe"/><path d="M1200 165h345v18h-345z" fill="#dbeafe"/>
  <text x="1225" y="160" class="entity">flood_reports</text><text x="1225" y="205" class="head">PRIMARY REPORT ROW</text><line x1="1225" y1="217" x2="1518" y2="217" class="line"/>
  <text x="1225" y="243" class="field">id, reporter_id, description</text><text x="1225" y="269" class="field">severity_claim, final_severity</text><text x="1225" y="295" class="field">ai_used, verification_status</text><text x="1225" y="321" class="field">coordinates + PostGIS location</text><text x="1225" y="347" class="field">image_path + image metadata</text><text x="1225" y="393" class="note">Created by POST /reports</text><text x="1225" y="415" class="note">PENDING_REVIEW -> PROVISIONAL</text>

  <rect x="55" y="570" width="300" height="210" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="55" y="570" width="300" height="54" rx="18" fill="#e2e8f0"/><path d="M55 606h300v18H55z" fill="#e2e8f0"/>
  <text x="80" y="603" class="entity">refresh_sessions</text><text x="80" y="651" class="field">user_id, family_id</text><text x="80" y="677" class="field">token_hash, replaced_by_id</text><text x="80" y="703" class="note">raw refresh tokens are not stored</text>

  <rect x="400" y="570" width="350" height="210" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="400" y="570" width="350" height="54" rx="18" fill="#ffedd5"/><path d="M400 606h350v18H400z" fill="#ffedd5"/>
  <text x="425" y="603" class="entity">incidents</text><text x="425" y="651" class="field">category, severity, status</text><text x="425" y="677" class="field">location, first/last reported</text><text x="425" y="725" class="note">optional grouping; not created here</text>

  <rect x="800" y="570" width="350" height="210" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="800" y="570" width="350" height="54" rx="18" fill="#e2e8f0"/><path d="M800 606h350v18H800z" fill="#e2e8f0"/>
  <text x="825" y="603" class="entity">audit_logs</text><text x="825" y="651" class="field">actor_id, action</text><text x="825" y="677" class="field">entity_type, entity_id, metadata</text><text x="825" y="725" class="note">report create/update/moderation trail</text>

  <rect x="1200" y="570" width="345" height="210" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="1225" y="610" class="entity">outside schema</text><text x="1225" y="651" class="field">uploads_data volume</text><text x="1225" y="677" class="field">private image bytes</text><text x="1225" y="713" class="field">DB stores image_path only</text><text x="1225" y="751" class="note">No Media table / no media_id</text>

  <path d="M355 275 H400" fill="none" stroke="#334155" stroke-width="2.5"/><text x="378" y="261" text-anchor="middle" class="rel">owns</text>
  <path d="M750 285 H800" fill="none" stroke="#334155" stroke-width="2.5"/><text x="775" y="271" text-anchor="middle" class="rel">draft analysis</text>
  <path d="M1150 285 H1200" fill="none" stroke="#334155" stroke-width="2.5" stroke-dasharray="7 6"/><text x="1175" y="271" text-anchor="middle" class="rel">background analysis</text>
  <path d="M355 675 C380 675 380 340 400 340" fill="none" stroke="#64748b" stroke-width="2"/><text x="370" y="520" class="rel">user</text>
  <path d="M355 690 C620 920 1070 920 1200 420" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6"/><text x="700" y="905" class="rel">user owns report</text>
  <path d="M750 675 H800" fill="none" stroke="#334155" stroke-width="2.5"/><text x="775" y="661" text-anchor="middle" class="rel">groups</text>
  <path d="M1150 675 H1200" fill="none" stroke="#334155" stroke-width="2.5"/><text x="1175" y="661" text-anchor="middle" class="rel">image key</text>

  <rect x="55" y="965" width="1490" height="70" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="80" y="995" class="field"><tspan font-weight="700">Primary lifecycle:</tspan> POST /reports -> flood_reports + ai_analyses(PROCESSING) -> background AI update -> GET /reports/map</text>
  <text x="80" y="1019" class="note">Map receives ReportMapDto, not image_path, image bytes, reporter identity, or raw database records.</text>
</svg>
